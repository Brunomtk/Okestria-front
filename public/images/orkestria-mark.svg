<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Orkestria — Cortex Cluster mark">
  <defs>
    <linearGradient id="mb-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="mb-link" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="mb-halo-amber" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mb-halo-violet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Hexagonal cluster: 1 center node + 6 satellites at 60° spacing.
       Coordinates: center (128,128). Outer radius ≈ 80.
       Angles 0°, 60°, 120°, 180°, 240°, 300° starting from top. -->

  <!-- 6 outer-to-outer ring connections (hexagon outline, faint) -->
  <polygon
    points="128,48 197.28,88 197.28,168 128,208 58.72,168 58.72,88"
    fill="none"
    stroke="url(#mb-link)"
    stroke-width="1.6"
    stroke-opacity="0.45"
    stroke-linejoin="round"
  />

  <!-- 6 spokes center → satellites -->
  <line x1="128" y1="128" x2="128" y2="48"   stroke="url(#mb-link)" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="197.28" y2="88"  stroke="url(#mb-link)" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="197.28" y2="168" stroke="url(#mb-link)" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="128" y2="208"  stroke="url(#mb-link)" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="58.72" y2="168"  stroke="url(#mb-link)" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="58.72" y2="88"   stroke="url(#mb-link)" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Satellite halos (subtle) -->
  <circle cx="128"    cy="48"  r="22" fill="url(#mb-halo-amber)"/>
  <circle cx="197.28" cy="88"  r="20" fill="url(#mb-halo-violet)"/>
  <circle cx="197.28" cy="168" r="20" fill="url(#mb-halo-violet)"/>
  <circle cx="128"    cy="208" r="20" fill="url(#mb-halo-violet)"/>
  <circle cx="58.72"  cy="168" r="20" fill="url(#mb-halo-violet)"/>
  <circle cx="58.72"  cy="88"  r="20" fill="url(#mb-halo-violet)"/>

  <!-- Outer satellites — 5 cyan + 1 amber (lead) at top -->
  <circle cx="128"    cy="48"  r="10" fill="#f59e0b"/>
  <circle cx="128"    cy="48"  r="4"  fill="#fffbe6"/>
  <circle cx="197.28" cy="88"  r="9"  fill="#22d3ee"/>
  <circle cx="197.28" cy="168" r="9"  fill="#a78bfa"/>
  <circle cx="128"    cy="208" r="9"  fill="#22d3ee"/>
  <circle cx="58.72"  cy="168" r="9"  fill="#a78bfa"/>
  <circle cx="58.72"  cy="88"  r="9"  fill="#22d3ee"/>

  <!-- Center node — bigger, gradient fill, the "operator/cortex" -->
  <circle cx="128" cy="128" r="14" fill="url(#mb-grad)"/>
  <circle cx="128" cy="128" r="6"  fill="#ffffff"/>
</svg>
